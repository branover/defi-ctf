[profile.default]
src    = "src"
out    = "out"
libs   = ["lib", "../contracts/lib"]
test   = "test"
script = "script"
solc   = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200

# Load .env automatically so $RPC_URL / $PRIVATE_KEY are available in scripts
# without having to export them manually in the shell.
# Run `source .env` or let forge pick it up via dotenv support.

[rpc_endpoints]
# Populated from .env — run `./env.sh` to generate it.
local = "${RPC_URL}"
